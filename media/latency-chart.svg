<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" role="img" aria-label="Latency p95 before and after the fix">
  <style>
    .sans { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    .mono { font-family: ui-monospace, Menlo, Consolas, monospace; }
  </style>
  <rect width="720" height="400" rx="14" fill="#14141f" />
  <rect x="0.5" y="0.5" width="719" height="399" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.08" />

  <text x="32" y="44" class="sans" font-size="19" font-weight="600" fill="#f8fafc">/search — latency p95 by route (ms)</text>
  <text x="32" y="68" class="sans" font-size="13" fill="#94a3b8">staging · 10k requests per route · before vs. after</text>

  <!-- legend -->
  <rect x="512" y="30" width="12" height="12" rx="3" fill="#f38ba8" />
  <text x="530" y="41" class="sans" font-size="12.5" fill="#cdd6f4">before</text>
  <rect x="592" y="30" width="12" height="12" rx="3" fill="#a6e3a1" />
  <text x="610" y="41" class="sans" font-size="12.5" fill="#cdd6f4">after</text>

  <!-- gridlines -->
  <g stroke="#ffffff" stroke-opacity="0.07">
    <line x1="90" y1="110" x2="688" y2="110" />
    <line x1="90" y1="170" x2="688" y2="170" />
    <line x1="90" y1="230" x2="688" y2="230" />
    <line x1="90" y1="290" x2="688" y2="290" />
    <line x1="90" y1="350" x2="688" y2="350" />
  </g>
  <g class="mono" font-size="11" fill="#7f849c" text-anchor="end">
    <text x="80" y="114">800</text>
    <text x="80" y="174">600</text>
    <text x="80" y="234">400</text>
    <text x="80" y="294">200</text>
    <text x="80" y="354">0</text>
  </g>

  <!-- bars: pairs (before red, after green); baseline y=350, 0.3px/ms -->
  <g>
    <rect x="120" y="128" width="34" height="222" rx="4" fill="#f38ba8" />
    <rect x="158" y="308" width="34" height="42" rx="4" fill="#a6e3a1" />
    <text x="156" y="372" class="sans" font-size="12" fill="#94a3b8" text-anchor="middle">?q=</text>

    <rect x="252" y="152" width="34" height="198" rx="4" fill="#f38ba8" />
    <rect x="290" y="314" width="34" height="36" rx="4" fill="#a6e3a1" />
    <text x="288" y="372" class="sans" font-size="12" fill="#94a3b8" text-anchor="middle">?facet=</text>

    <rect x="384" y="188" width="34" height="162" rx="4" fill="#f38ba8" />
    <rect x="422" y="320" width="34" height="30" rx="4" fill="#a6e3a1" />
    <text x="420" y="372" class="sans" font-size="12" fill="#94a3b8" text-anchor="middle">?page=</text>

    <rect x="516" y="242" width="34" height="108" rx="4" fill="#f38ba8" />
    <rect x="554" y="326" width="34" height="24" rx="4" fill="#a6e3a1" />
    <text x="552" y="372" class="sans" font-size="12" fill="#94a3b8" text-anchor="middle">?sort=</text>
  </g>

  <!-- headline delta -->
  <text x="656" y="126" class="mono" font-size="15" font-weight="700" fill="#a6e3a1" text-anchor="end">−81%</text>
</svg>
