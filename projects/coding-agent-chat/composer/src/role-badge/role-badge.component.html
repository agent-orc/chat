<span
  class="role-badge"
  [class.role-badge--compact]="compact()"
  [attr.data-testid]="'role-badge-' + role().id"
  [attr.data-role-id]="role().id"
  [style.--role-accent]="role().accent"
  [cacTooltip]="role().description">
  <span class="role-badge__glyph" aria-hidden="true">{{ role().glyph }}</span>
  <span class="role-badge__label">{{ role().label }}</span>
</span>
