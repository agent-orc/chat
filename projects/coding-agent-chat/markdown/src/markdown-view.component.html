<div #body
     cacMarkdownLightbox
     class="markdown-body"
     [class.markdown-body--dense]="dense()"
     [class.markdown-body--editor]="editor()"
     [attr.data-testid]="testId()"
     (click)="onMarkdownClick($event)"
     (keyup.enter)="onMarkdownClick($event)"
     tabindex="-1"
     [innerHTML]="safeHtml()"></div>
