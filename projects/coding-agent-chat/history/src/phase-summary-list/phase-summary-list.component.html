@let isCompact = compact();
@let earlier = earlierPhases();
@let revealed = compactRevealed();
@let visible = isCompact && !revealed ? [] : phases();
<section
  class="phase-summary"
  [class.phase-summary--compact]="isCompact"
  data-testid="phase-summary-list"
  [attr.data-phase-count]="phases().length"
  [attr.data-compact-revealed]="isCompact ? (revealed ? 'true' : 'false') : null"
  aria-label="Workforce chat phase summary">
  @if (isCompact && earlier.length > 0) {
    <button
      type="button"
      class="phase-summary__compact-toggle"
      data-testid="phase-summary-compact-toggle"
      [attr.aria-expanded]="revealed"
      (click)="toggleCompactRevealed()">
      <span class="phase-summary__caret" aria-hidden="true">{{ revealed ? '▾' : '▸' }}</span>
      <span class="phase-summary__compact-label">{{ earlier.length }} earlier {{ earlier.length === 1 ? 'phase' : 'phases' }}</span>
      <span class="phase-summary__compact-range">{{ earlierRange() }}</span>
    </button>
  }
  @if (!isCompact && phases().length === 0) {
    <div class="phase-summary__empty">No phases yet.</div>
  }
  @for (phase of visible; track phase.id) {
    <div
      class="phase-summary__row"
      [class.phase-summary__row--expanded]="isExpanded(phase.id)"
      [attr.data-testid]="'phase-summary-row'"
      [attr.data-phase-id]="phase.id"
      [attr.data-expanded]="isExpanded(phase.id) ? 'true' : 'false'">
      <button
        type="button"
        class="phase-summary__toggle"
        [attr.data-testid]="'phase-summary-toggle-' + phase.id"
        [attr.aria-expanded]="isExpanded(phase.id)"
        [cacTooltip]="phase.summary"
        (click)="togglePhase(phase.id)">
        <span class="phase-summary__caret" aria-hidden="true">{{ isExpanded(phase.id) ? '▾' : '▸' }}</span>
        <span class="phase-summary__participants">
          @for (role of phase.participants; track role.id) {
            <cac-role-badge
              [roleId]="role.id"
              [compact]="true" />
          }
        </span>
        <span class="phase-summary__line">{{ phase.summary }}</span>
        <span class="phase-summary__count">{{ phase.messageCount }}</span>
        <span class="phase-summary__time">{{ formatTimeRange(phase) }}</span>
      </button>
    </div>
  }
</section>
