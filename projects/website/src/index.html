<!doctype html>
<html lang="en" data-studio-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>@coding-agent/chat — the Angular chat UI for coding agents</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Angular library that renders coding-agent conversations — the frontend counterpart to coding-agent-runner. 23+ event kinds, zero-Angular core, 7 entry points, drop-in studio theme, zoneless."
    />
    <meta
      name="keywords"
      content="Angular, coding agent, chat UI, agent conversation, LLM, streaming, TypeScript, zoneless, component library, coding-agent-runner"
    />
    <meta name="author" content="Robert Mischke" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0f0f1a" />

    <!-- Theme boot: apply the stored / OS-preferred theme to <html> before the
         first paint so there is no dark→light flash on load. The App component
         reads this attribute back and owns the in-page toggle afterwards. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('cac-site-theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          var root = document.documentElement;
          root.setAttribute('data-studio-theme', theme);
          root.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>

    <!-- Canonical + social. Absolute URLs (crawlers ignore <base>); the GitHub
         Pages base is /coding-agent-chat/. The share image is an SVG card in
         public/ — swap in a PNG export for maximum crawler coverage. -->
    <link rel="canonical" href="https://robertmischke.github.io/coding-agent-chat/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="@coding-agent/chat" />
    <meta property="og:title" content="@coding-agent/chat — Angular chat UI for coding agents" />
    <meta
      property="og:description"
      content="An Angular library that renders an agent's event stream as a readable conversation — messages, tool activity, waits and decisions. Zoneless, zero-Angular core, 7 entry points."
    />

    <meta

    />
