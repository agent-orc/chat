<!doctype html>
<html lang="en" data-studio-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>coding-agent-chat</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0f0f1a" />

    <!-- Theme boot: apply the stored / OS-preferred theme to <html> before the
         first paint so there is no dark→light flash on load. The App component
         reads this attribute back and owns the in-page toggle afterwards.
         Also syncs the theme-color meta (browser UI chrome) — the static value
         below is dark-only. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('cac-site-theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          var root = document.documentElement;
          root.setAttribute('data-studio-theme', theme);
          root.style.colorScheme = theme;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', theme === 'light' ? '#ffffff' : '#0f0f1a');
        } catch (e) {}
      })();
    </script>

    <!-- Critical light-theme surface. The build inlines critical CSS from the
         PRERENDERED (dark) DOM only and loads the full stylesheet async, so
         without this block a light-preference visitor gets a dark first paint
         until styles-*.css arrives. Hand-authored style tags survive the
         build untouched. -->
    <style>
      html[data-studio-theme='light'],
      html[data-studio-theme='light'] body {
        background: #ffffff;
        color: #333333;
      }
    </style>

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
