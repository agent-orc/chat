name: release

# Publishes coding-agent-chat to npmjs.com when a version tag is pushed
# (e.g. v0.2.0). The version is derived from the tag and must match the
# package SemVer in projects/coding-agent-chat/package.json.
#
# Auth uses npm Trusted Publishing (OIDC): no long-lived token in secrets.
# GitHub Actions mints a short-lived OIDC token; npm (CLI >= 11.5) exchanges it
# against the Trusted Publisher policy configured on npmjs.com for this
# package (repo agent-orc/chat, workflow release.yml).
#
# ONE-TIME SETUP (npm requires the package to exist before a Trusted
# Publisher can be configured): the very first publish must be manual -
#   npm login && npm run build
#   cd dist/coding-agent-chat && npm publish --access public
# - then add the Trusted Publisher on npmjs.com > package > Settings.
#
# To cut a release: `scripts/release.sh 0.2.0` (or push a `v0.2.0` tag).
on:
  push:
    tags: ['v*.*.*']

jobs:
  publish:
    name: build, test & publish to npmjs.com
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for Trusted Publishing / provenance
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package SemVer
        run: |
          package_version="$(node -p "require('./projects/coding-agent-chat/package.json').version")"
          release_version="${{ steps.ver.outputs.version }}"
          if [ "$package_version" != "$release_version" ]; then
            echo "error: package version $package_version does not match tag version $release_version" >&2
            exit 1
          fi
          if [ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ]; then
            echo "error: checkout is not pinned to the tagged commit" >&2
            exit 1
          fi
          if [ -n "$(git status --porcelain --untracked-files=all)" ]; then
            echo "error: tagged checkout is dirty" >&2
            git status --short
            exit 1
          fi

      - name: Install
        run: npm ci

      - name: Test (kernel + component specs)
        run: npx ng test

      - name: Build library
        run: npm run build

      - name: Stamp release metadata + manifest
        run: node scripts/stamp-release.mjs --dist dist/coding-agent-chat --version "${{ steps.ver.outputs.version }}" --tag "${GITHUB_REF_NAME}" --commit "${GITHUB_SHA}"

      - name: Verify publish payload integrity
        run: npm run release:verify

      - name: Publish (Trusted Publishing / provenance)
        working-directory: dist/coding-agent-chat
        run: npm publish --provenance --access public
