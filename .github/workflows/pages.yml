name: pages

# Builds the public website (projects/website) and deploys it to GitHub Pages
# on every push to main. The website consumes the BUILT library from dist/
# (tsconfig paths + theme CSS), so the library build must run first.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: build website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build library (website consumes dist/)
        run: npm run build

      - name: Build website
        run: npx ng build website --base-href /coding-agent-chat/

      - name: SPA fallback (404.html)
        run: cp dist/website/browser/index.html dist/website/browser/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/website/browser

  deploy:
    name: deploy to github pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
